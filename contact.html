<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Us — Nlightn Foundation</title>
    <meta name="description" content="Contact Nlightn Foundation" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="/assets/include.js"></script>
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="section section-paper">
        <div class="container">
          <h1>Contact Us</h1>
          <p class="lead">
            Want to partner on education programmes, sponsor via CSR, or volunteer?
            Send us a message.
          </p>

          <div class="grid-3" style="margin-top: 22px">
            <div class="card">
              <div class="kicker">Email</div>
              <p style="margin-top: 10px">
                hello@nlightnfoundation.org (placeholder)
              </p>
            </div>
            <div class="card">
              <div class="kicker">Location</div>
              <p style="margin-top: 10px">India (add city/state) — placeholder</p>
            </div>
            <div class="card">
              <div class="kicker">Partnerships</div>
              <p style="margin-top: 10px">
                CSR funders, schools, NGOs, volunteers — welcome.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
  </body>
</html>
