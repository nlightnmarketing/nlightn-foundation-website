<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search — Nlightn Foundation</title>
    <meta name="description" content="Search Nlightn Foundation site" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="/assets/include.js"></script>
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="section section-paper">
        <div class="container">
          <h1>Search</h1>
          <p class="lead">
            Placeholder search page. If you want, we can add a real site search
            later.
          </p>

          <div class="card" style="margin-top: 22px">
            <div class="kicker">Search term</div>
            <input
              style="
                margin-top: 10px;
                width: 100%;
                border-radius: 18px;
                border: 1px solid var(--border);
                background: var(--surface);
                padding: 12px 14px;
                font-size: 15px;
              "
              placeholder="Search the site…"
            />
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
  </body>
</html>
